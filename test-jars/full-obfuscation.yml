version: 1
preset: PARANOID

transforms:
  renamer:
    enabled: true
    intensity: 1.0
    renameClasses: true
    renameMembers: true
    renameRuntime: true
    preserveReflectionStrings: true
  controlFlowFlattening:
    enabled: true
    intensity: 1.0
    strictCoverage: true
    zkmStyle: true
    tailChainIntensity: 0.85
    tryCatchTailChainMultiplier: 0.35
    allowTryCatchMethods: true
    tryCatchMainOnly: false
    maxTryCatchBlocks: 100000
    tryCatchBranchBonus: 16
    tryCatchInstructionBonus: 100000
    entrypointTailChainMultiplier: 0.08
    entrypointMaxTryCatchBlocks: 100000
    entrypointBranchBonus: 100000
    entrypointInstructionBonus: 100000
    allowSwitchMethods: true
    allowMonitorMethods: true
    maxApplicableInstructionCount: 100000
    maxBackwardBranches: 100000
    maxBranchCount: 100000
    dispatcherDepth: 2
    dispatcherFragments: 2
    dispatcherShapeVariation: true
    edgeKeyed: true
    linearChunkSize: 8
  exceptionObfuscation:
    enabled: true
    intensity: 1.0
    flattenedIntensityMultiplier: 0.55
    skipFlattenedMethods: false
    skipMethodsWithTryCatch: false
    skipMethodsWithSwitches: false
    skipMethodsWithMonitors: false
    skipNonVoidMethods: false
    skipBackwardGotos: false
    maxApplicableInstructionCount: 100000
    maxEligibleGotos: 100000
  exceptionReturn:
    enabled: true
    intensity: 1.0
  opaquePredicates:
    enabled: true
    intensity: 1.0
  stringEncryption:
    enabled: true
    intensity: 1.0
    directRuntime: true
    keyDispatcher: true
    useControlFlowKey: true
  numberEncryption:
    enabled: true
    intensity: 1.0
    algorithm: xor
    keyDispatcher: true
    useControlFlowKey: true
    skipMethodsWithTryCatch: false
    skipMethodsWithSwitches: false
    skipMethodsWithMonitors: false
    skipSensitiveApiMethods: false
    skipSmallLoopConstants: false
    maxPlainLoopConstant: 0
    maxApplicableInstructionCount: 100000
    maxBranchCount: 100000
  invokeDynamic:
    enabled: true
    intensity: 1.0
    keyDispatcher: true
    useControlFlowKey: true
    wrapSpecialCalls: true
    skipMethodsWithTryCatch: false
    skipMethodsWithSwitches: false
    skipMethodsWithMonitors: false
    skipSensitiveApiMethods: false
    skipPrimitiveLoopCalls: false
    maxApplicableInstructionCount: 100000
    maxBranchCount: 100000
  outliner:
    enabled: true
    intensity: 0.8
    minBlockSize: 3
  stackObfuscation:
    enabled: true
    intensity: 1.0
  advancedJvm:
    enabled: true
    intensity: 1.0

native:
  enabled: false

keys:
  masterSeed: auto